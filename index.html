<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Please Forgive Me 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #FF6EB4;
      --hot:    #FF1493;
      --lilac:  #C084FC;
      --coral:  #FF7F7F;
      --cream:  #FFF0F6;
      --yellow: #FFD166;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #f0d4ff 40%, #ffd6e0 70%, #ffe8b0 100%);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Floating hearts background ── */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      font-size: 2rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(15deg) scale(1.2); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 60px rgba(255,105,180,0.28), 0 2px 16px rgba(192,132,252,0.18);
      border: 2px solid rgba(255,110,180,0.22);
      margin: 2rem auto;
    }

    .emoji-row {
      font-size: 2.4rem;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 8vw, 3rem);
      background: linear-gradient(90deg, var(--hot), var(--lilac), var(--coral));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      font-size: clamp(0.95rem, 3.5vw, 1.15rem);
      color: #9b6b9b;
      font-weight: 700;
      margin-bottom: 2.2rem;
      line-height: 1.5;
    }

    /* ── Image / illustration ── */
    .bear {
      font-size: clamp(5rem, 20vw, 8rem);
      margin-bottom: 1.5rem;
      display: block;
      animation: wobble 3s ease-in-out infinite;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg); }
    }

    /* ── Buttons ── */
    .btn-area {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 80px;
      position: relative;
    }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      line-height: 1;
      white-space: nowrap;
    }
    .btn:focus-visible { outline: 3px solid var(--lilac); outline-offset: 3px; }

    #yesBtn {
      background: linear-gradient(135deg, var(--hot), var(--lilac));
      color: #fff;
      padding: 0.85em 2em;
      font-size: 1.3rem;
      box-shadow: 0 6px 24px rgba(255,20,147,0.35);
    }
    #yesBtn:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(255,20,147,0.5); }
    #yesBtn:active { transform: scale(0.97); }

    #noBtn {
      background: linear-gradient(135deg, #e0e0e0, #bdbdbd);
      color: #555;
      padding: 0.85em 2em;
      font-size: 1.3rem;
      position: relative; /* JS will switch to fixed */
    }
    #noBtn:hover { background: linear-gradient(135deg, #d0d0d0, #a0a0a0); }

    /* ── Yes screen ── */
    #yesScreen {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    #yesScreen.visible { display: flex; }
    .card.yes-mode .main-content { display: none; }
    .card.yes-mode #yesScreen { display: flex; }

    #yesScreen h2 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 7vw, 2.5rem);
      background: linear-gradient(90deg, var(--hot), var(--lilac));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 1rem 0 0.5rem;
    }
    #yesScreen p {
      color: #9b6b9b;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .confetti-emoji {
      font-size: 3.5rem;
      animation: spin 1s ease-in-out;
    }
    @keyframes spin { from { transform: rotate(0deg) scale(0); } to { transform: rotate(720deg) scale(1); } }

    /* ── Sparkles decoration ── */
    .sparkle {
      position: absolute;
      pointer-events: none;
      font-size: 1.3rem;
      animation: sparkleAnim 1.5s ease-in-out infinite alternate;
    }
    @keyframes sparkleAnim {
      from { opacity: 0.5; transform: scale(0.8) rotate(-10deg); }
      to   { opacity: 1;   transform: scale(1.2) rotate(10deg); }
    }
    .sp1 { top: -18px; left: 24px; animation-delay: 0s; }
    .sp2 { top: -12px; right: 36px; animation-delay: 0.4s; }
    .sp3 { bottom: 10px; left: 14px; animation-delay: 0.7s; }
    .sp4 { bottom: 8px; right: 20px; animation-delay: 0.2s; }
  </style>
</head>
<body>

<!-- Floating hearts -->
<div class="hearts-bg" id="heartsBg"></div>

<div class="card" id="card">
  <!-- Sparkles -->
  <span class="sparkle sp1">✨</span>
  <span class="sparkle sp2">💫</span>
  <span class="sparkle sp3">🌸</span>
  <span class="sparkle sp4">⭐</span>

  <!-- Main content -->
  <div class="main-content">
    <div class="emoji-row">💖 💕 💗 💘 💝</div>
    <span class="bear">🥺🧸</span>
    <h1>Andri please forgive me</h1>
    <p class="subtitle">I know I messed up… but my heart still beats for you.<br>Will you forgive me? 💌</p>

    <div class="btn-area" id="btnArea">
      <button class="btn" id="yesBtn" onclick="onYes()">Yes 💕</button>
      <button class="btn" id="noBtn" onmouseenter="runAway()" ontouchstart="runAway()">No</button>
    </div>
  </div>

  <!-- Yes screen -->
  <div id="yesScreen">
    <span class="confetti-emoji">🎉</span>
    <h2>Yay!! Thank you!!</h2>
    <p>You just made me the happiest person ever 💖<br>I promise I'll do better. Always. 🌹</p>
    <br>
    <p style="font-family:'Pacifico',cursive; font-size:1.4rem; color:#FF6EB4;">Love, Klea 💌</p>
    <br>
    <span style="font-size:3rem">🥰🥰🥰</span>
  </div>
</div>

<script>
  /* ── Floating hearts ── */
  const heartsBg = document.getElementById('heartsBg');
  const emojis = ['💖','💕','💗','💘','💝','🌸','✨','💫','🌹','💌','🫶','❤️'];
  for (let i = 0; i < 22; i++) {
    const h = document.createElement('span');
    h.classList.add('heart-float');
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (1.2 + Math.random() * 2.2) + 'rem';
    h.style.animationDuration = (5 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    heartsBg.appendChild(h);
  }

  /* ── No button escape logic ── */
  let noCount = 0;
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  let noFixed = false;

  function runAway() {
    noCount++;

    // Grow Yes button
    const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
    const newSize = Math.min(currentSize * 1.18, 52);
    yesBtn.style.fontSize = newSize + 'px';

    // After 2 attempts, make No button jump around the screen
    if (noCount >= 2 && !noFixed) {
      noFixed = true;
      noBtn.style.position = 'fixed';
      noBtn.style.zIndex = '9999';
    }

    if (noFixed) {
      const margin = 80;
      const maxX = window.innerWidth  - noBtn.offsetWidth  - margin;
      const maxY = window.innerHeight - noBtn.offsetHeight - margin;
      const rx = margin + Math.random() * maxX;
      const ry = margin + Math.random() * maxY;
      noBtn.style.left = rx + 'px';
      noBtn.style.top  = ry + 'px';
    }

    // After 20 attempts, hide No button entirely
    if (noCount >= 20) {
      noBtn.style.display = 'none';
    }

    // Update No button label to get sadder
    const noCaptions = [
      'No', 'No…', 'Are you sure? 😢', 'Really sure? 🥺',
      'Please don\'t… 💔', 'Think again! 🥺', 'Nooo! 😭',
      'Wait! 🙏', 'Come back! 😰', 'I\'m begging you! 😭',
      'Please… 🥺💔', 'My heart hurts! 💔', 'Don\'t do this… 😢',
      'One more chance! 🙏', 'I\'ll cry… 😭', 'PLEASE! 😭💔',
      'You\'re breaking me! 💔', 'Last chance… 🥺', 'Noooooo! 😭',
      'Ok fine… 😭💔'
    ];
    noBtn.textContent = noCaptions[Math.min(noCount, noCaptions.length - 1)];
  }

  function onYes() {
    // Hide no button if fixed
    if (noFixed) noBtn.style.display = 'none';
    document.getElementById('card').classList.add('yes-mode');
  }
</script>

</body>
</html>
